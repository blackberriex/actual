<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark steel circle background -->
  <circle cx="50" cy="50" r="48" fill="#1e293b" />
  <!-- Thick outer ring -->
  <circle cx="50" cy="50" r="32" stroke="#ffffff" stroke-width="10" fill="none" />
  <!-- Thick cross handles -->
  <line x1="50" y1="10" x2="50" y2="90" stroke="#ffffff" stroke-width="10" stroke-linecap="round" />
  <line x1="10" y1="50" x2="90" y2="50" stroke="#ffffff" stroke-width="10" stroke-linecap="round" />
  <!-- Solid central knob -->
  <circle cx="50" cy="50" r="18" fill="#ffffff" />
  <!-- Small dark center dot -->
  <circle cx="50" cy="50" r="6" fill="#1e293b" />
</svg>
