<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <style>
    svg {
      color: #ffffff;
    }
    @media (prefers-color-scheme: light) {
      svg {
        color: #161617;
      }
    }
  </style>
  <!-- Safe Body -->
  <rect x="3.5" y="3" width="17" height="18" rx="2.5" />
  
  <!-- Safe Door panel -->
  <rect x="5.5" y="5" width="13" height="14" rx="1.5" stroke-width="1.2" opacity="0.8" />
  
  <!-- Dial Wheel -->
  <circle cx="12" cy="12" r="3.8" />
  
  <!-- Dial Pointer Tick -->
  <line x1="12" y1="5" x2="12" y2="6.5" stroke-width="1.2" />
  
  <!-- Dial pointer line -->
  <line x1="12" y1="12" x2="13.8" y2="9.5" stroke-width="1.5" />
  
  <!-- Central Spindle -->
  <circle cx="12" cy="12" r="0.8" fill="currentColor" stroke="none" />
  
  <!-- Hinges -->
  <line x1="1.5" y1="7" x2="3.5" y2="7" />
  <line x1="1.5" y1="17" x2="3.5" y2="17" />
</svg>
