<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <style>
    svg {
      color: #ffffff;
    }
    @media (prefers-color-scheme: light) {
      svg {
        color: #161617;
      }
    }
  </style>
  <!-- Outer combination dial ring -->
  <circle cx="12" cy="12" r="9.5" />
  
  <!-- Inner circular groove -->
  <circle cx="12" cy="12" r="6" stroke-dasharray="2 2" stroke-width="1" opacity="0.7" />
  
  <!-- Outer alignment ticks (Twelve, Three, Six, Nine o'clock) -->
  <line x1="12" y1="2.5" x2="12" y2="4.5" />
  <line x1="12" y1="19.5" x2="12" y2="21.5" />
  <line x1="2.5" y1="12" x2="4.5" y2="12" />
  <line x1="19.5" y1="12" x2="21.5" y2="12" />
  
  <!-- 45-degree sub-ticks -->
  <line x1="17" y1="7" x2="18.4" y2="5.6" opacity="0.6" stroke-width="1" />
  <line x1="17" y1="17" x2="18.4" y2="18.4" opacity="0.6" stroke-width="1" />
  <line x1="7" y1="17" x2="5.6" y2="18.4" opacity="0.6" stroke-width="1" />
  <line x1="7" y1="7" x2="5.6" y2="5.6" opacity="0.6" stroke-width="1" />
  
  <!-- Center lock spindle / knob -->
  <circle cx="12" cy="12" r="2" fill="currentColor" />
  
  <!-- Pointer indicator pointing to 2 o'clock -->
  <line x1="12" y1="12" x2="16.5" y2="7.5" stroke-width="2" />
</svg>
