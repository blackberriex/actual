# rules.yaml - Configuration for the Bank Statement Normalizer

# Mapping of card last 4 digits to Actual account names
cards:
  '7100': 'Privat USD'
  '9366': 'Privat UAH'
  '7833': 'Privat UAH'

# Patterns to identify transfer transactions between your own accounts
transfer_rules:
  - pattern: "Зі своєї картки \\*(\\d{4})"
    direction: 'from'
  - pattern: "На свою картку \\*(\\d{4})"
    direction: 'to'

# Custom regex overrides for specific merchants
rules:
  - pattern: 'EPIC GAMES'
    payee: 'Epic Games Store'
    category: 'Entertainment'
  - pattern: 'NETFLIX'
    payee: 'Netflix'
    category: 'Entertainment'
  - pattern: 'UBER'
    payee: 'Uber'
    category: 'Transport'
  - pattern: 'GLOVO'
    payee: 'Glovo'
    category: 'Food'

# Translation lookup table for category names (English rules to database/Ukrainian values)
category_translations:
  'Entertainment': 'Розваги'
  'Food': 'Продукти'
  'Transport': 'Транспорт'
  'Travel': 'Подорожі'
  'Utilities': 'Комунальні послуги'
